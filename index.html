<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Pixel Battle FINAL FIX</title>
<style>
body{margin:0;background:#111;color:white;font-family:Arial;display:flex;flex-direction:column;align-items:center}
#auth{margin-top:20px;display:flex;flex-direction:column;gap:8px;width:220px}
input,button{padding:10px;border-radius:8px;border:none}
button{cursor:pointer}
#game{display:none;flex-direction:column;align-items:center;width:100%}

#palette{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin:10px;
  justify-content:center;
}

.color{
  width:42px;height:42px;border-radius:10px;
  border:2px solid #444;
  transition:0.15s;
}

.color.active{
  border:3px solid white;
  transform:scale(1.15);
  box-shadow:0 0 10px white;
}

canvas{border:2px solid white;touch-action:none}
#info{margin-top:5px}
</style>
</head>
<body>

<h2>🔥 Pixel Battle</h2>

<div id="auth">
  <input id="loginInput" placeholder="логин">
  <input id="passInput" placeholder="пароль" type="password">
  <button onclick="register()">Регистрация</button>
  <button onclick="login()">Вход</button>
</div>

<div id="game">
  <div id="info"></div>
  <div id="palette"></div>
  <canvas id="c"></canvas>
</div>

<script>
const DB = "https://cooldbforpixelbattle-default-rtdb.europe-west1.firebasedatabase.app";

let user = null;
let currentColor = "#ff0000";
let grid = {};
let lastData = "";

const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");
const info = document.getElementById("info");
const palette = document.getElementById("palette");

const SIZE = 64;

let scale = 12;
let offsetX = 0;
let offsetY = 0;

let dragging = false;
let moved = false;
let startX=0,startY=0;
let lastX=0,lastY=0;

// COLORS
const COLORS = [
  "#ff0000","#ff7f00","#ffff00","#00ff00",
  "#00ffff","#0000ff","#8b00ff","#ff00ff",
  "#ffffff","#888888","#000000","#964B00"
];

function buildPalette(){
  palette.innerHTML="";
  COLORS.forEach((c,i)=>{
    const el = document.createElement("div");
    el.className = "color" + (i===0 ? " active" : "");
    el.style.background = c;

    el.addEventListener("click",(e)=>{
      e.stopPropagation();
      currentColor = c;
      document.querySelectorAll(".color").forEach(e=>e.classList.remove("active"));
      el.classList.add("active");
    });

    palette.appendChild(el);
  });
}
buildPalette();

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight - 140;
}
window.addEventListener("resize",resize);
resize();

function clampCamera(){
  const minX = canvas.width - SIZE*scale;
  const minY = canvas.height - SIZE*scale;
  offsetX = Math.min(0, Math.max(minX, offsetX));
  offsetY = Math.min(0, Math.max(minY, offsetY));
}

function screenToWorld(clientX, clientY){
  const rect = canvas.getBoundingClientRect();
  const x = (clientX - rect.left);
  const y = (clientY - rect.top);
  return {
    x: Math.floor((x - offsetX) / scale),
    y: Math.floor((y - offsetY) / scale)
  };
}

// INPUT
canvas.addEventListener("pointerdown",e=>{
  dragging=true;
  moved=false;
  startX=e.clientX;
  startY=e.clientY;
  lastX=e.clientX;
  lastY=e.clientY;
});

canvas.addEventListener("pointermove",e=>{
  if(!dragging) return;

  const dx = e.clientX-lastX;
  const dy = e.clientY-lastY;

  if(Math.abs(e.clientX-startX)>4 || Math.abs(e.clientY-startY)>4) moved=true;

  offsetX += dx;
  offsetY += dy;

  clampCamera();

  lastX=e.clientX;
  lastY=e.clientY;
});

canvas.addEventListener("pointerup",e=>{
  dragging=false;

  if(!moved){
    const p = screenToWorld(e.clientX,e.clientY);
    if(p.x>=0 && p.x<SIZE && p.y>=0 && p.y<SIZE){
      place(p.x,p.y);
    }
  }
});

// ZOOM (FIXED)
canvas.addEventListener("wheel",e=>{
  e.preventDefault();

  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;

  const wx = (mx - offsetX)/scale;
  const wy = (my - offsetY)/scale;

  const zoom = e.deltaY<0 ? 1.1 : 0.9;
  scale *= zoom;
  scale = Math.max(6, Math.min(40, scale));

  offsetX = mx - wx*scale;
  offsetY = my - wy*scale;

  clampCamera();
},{passive:false});

// PINCH ZOOM FIX
let lastDist = 0;
canvas.addEventListener("touchmove",e=>{
  if(e.touches.length===2){
    e.preventDefault();

    const rect = canvas.getBoundingClientRect();

    const x1 = e.touches[0].clientX - rect.left;
    const y1 = e.touches[0].clientY - rect.top;
    const x2 = e.touches[1].clientX - rect.left;
    const y2 = e.touches[1].clientY - rect.top;

    const dx = x1 - x2;
    const dy = y1 - y2;
    const dist = Math.sqrt(dx*dx + dy*dy);

    if(lastDist){
      const zoom = dist / lastDist;
      scale *= zoom;
      scale = Math.max(6, Math.min(40, scale));
      clampCamera();
    }

    lastDist = dist;
  }
},{passive:false});

canvas.addEventListener("touchend",()=>{lastDist=0});

// DRAW
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.strokeStyle="white";
  ctx.strokeRect(offsetX,offsetY,SIZE*scale,SIZE*scale);

  for(const k in grid){
    const p=grid[k];
    if(p.x<0||p.x>=SIZE||p.y<0||p.y>=SIZE) continue;

    ctx.fillStyle=p.color;
    ctx.fillRect(offsetX+p.x*scale,offsetY+p.y*scale,scale,scale);
  }

  requestAnimationFrame(draw);
}
draw();

// LOAD
async function load(){
  const r=await fetch(`${DB}/pixels.json`);
  const txt=await r.text();
  if(txt!==lastData){
    lastData=txt;
    grid=JSON.parse(txt)||{};
  }
}
setInterval(load,500);

// USER
async function getUser(l){
  const r=await fetch(`${DB}/users/${l}.json`);
  return await r.json();
}

async function updateUser(d){
  await fetch(`${DB}/users/${user}.json`,{
    method:"PATCH",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(d)
  });
}

async function place(x,y){
  const u=await getUser(user);
  if(!u||u.pixels<=0) return;

  await fetch(`${DB}/pixels/${x}_${y}.json`,{
    method:"PUT",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({x,y,color:currentColor,user,t:Date.now()})
  });

  await updateUser({pixels:u.pixels-1});
}

// AUTH
async function hash(str){
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

async function register(){
  const l=loginInput.value.trim();
  const p=passInput.value;
  if(!l||!p)return alert("заполни поля");
  if(await getUser(l))return alert("занят");
  const hp=await hash(p);
  await fetch(`${DB}/users/${l}.json`,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify({pass:hp,pixels:30,last:Date.now()})});
  alert("готово");
}

async function login(){
  const l=loginInput.value.trim();
  const p=passInput.value;
  const d=await getUser(l);
  if(!d)return alert("нет юзера");
  if(await hash(p)!==d.pass)return alert("пароль");
  user=l;localStorage.setItem("pb_user",l);startGame();
}

function startGame(){
  document.getElementById("auth").style.display="none";
  document.getElementById("game").style.display="flex";
  regen();
}

function regen(){
  setInterval(async()=>{
    const u=await getUser(user);
    if(!u)return;
    const now=Date.now();
    const add=Math.floor((now-u.last)/30000);
    if(add>0){
      u.pixels=Math.min(30,u.pixels+add);
      u.last=now;
      await updateUser({pixels:u.pixels,last:u.last});
    }
    info.innerText=`👤 ${user} | ⚡ ${u.pixels}/30`;
  },1000);
}

window.onload=async()=>{
  const u=localStorage.getItem("pb_user");
  if(u && await getUser(u)){
    user=u;startGame();
  }
};
</script>
</body>
</html>
